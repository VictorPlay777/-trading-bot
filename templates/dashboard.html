<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Bot Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e0e0e0;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }
        
        .header h1 {
            font-size: 28px;
            color: #00d4ff;
        }
        
        .status-badge {
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
        }
        
        .status-running {
            background: #00ff88;
            color: #1a1a2e;
        }

        .status-stopped {
            background: #ff4757;
            color: white;
        }

        .status-paused {
            background: #9b59b6;
            color: white;
        }
        
        .controls {
            display: flex;
            gap: 10px;
        }
        
        .settings-btn {
            background: #00d4ff;
            color: #1a1a2e;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: #1a1a2e;
            padding: 30px;
            border-radius: 10px;
            max-width: 800px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid rgba(0, 212, 255, 0.3);
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .modal-header h2 {
            color: #00d4ff;
        }
        
        .close-btn {
            background: #ff4757;
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .tab {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: none;
            cursor: pointer;
            color: #e0e0e0;
            border-radius: 5px 5px 0 0;
        }
        
        .tab.active {
            background: #00d4ff;
            color: #1a1a2e;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #00d4ff;
            font-size: 14px;
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 8px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            color: #e0e0e0;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #00d4ff;
        }
        
        .form-group input[type="checkbox"] {
            width: auto;
        }
        
        .save-btn {
            background: #00ff88;
            color: #1a1a2e;
            padding: 10px 30px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .btn-start {
            background: #00ff88;
            color: #1a1a2e;
        }

        .btn-start.active {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .positions-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .position-item {
            padding: 10px;
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            border-left: 3px solid #4CAF50;
        }

        .position-item p {
            margin: 5px 0;
            font-size: 13px;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        .table th {
            background: rgba(255, 255, 255, 0.1);
            padding: 12px;
            text-align: left;
            font-size: 13px;
            font-weight: bold;
            color: #00d4ff;
        }

        .table td {
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 13px;
        }

        .table tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .direction-long {
            color: #00ff88;
            font-weight: bold;
        }

        .direction-short {
            color: #ff4757;
            font-weight: bold;
        }

        .positive {
            color: #00ff88;
        }

        .negative {
            color: #ff4757;
        }

        .refresh-btn {
            background: rgba(255, 255, 255, 0.1);
            color: #e0e0e0;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            margin-left: 10px;
        }

        .refresh-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .btn-stop {
            background: #ff4757;
            color: white;
        }

        .btn-restart {
            background: #ffa502;
            color: white;
        }

        .btn-pause {
            background: #9b59b6;
            color: white;
        }

        .btn-reset-balance {
            background: #e67e22;
            color: white;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .card h3 {
            color: #00d4ff;
            margin-bottom: 15px;
            font-size: 16px;
        }
        
        .metric {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .metric-label {
            color: #888;
            font-size: 14px;
        }
        
        .positive {
            color: #00ff88;
        }
        
        .negative {
            color: #ff4757;
        }
        
        .table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .table th,
        .table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .table th {
            color: #00d4ff;
            font-weight: 600;
        }
        
        .table tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        
        .logs-container {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 20px;
            height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }
        
        .log-line {
            padding: 2px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .log-info {
            color: #00d4ff;
        }
        
        .log-warning {
            color: #ffa500;
        }
        
        .log-error {
            color: #ff4757;
        }
        
        .chart-container {
            height: 300px;
            margin-top: 20px;
        }
        
        .refresh-btn {
            background: #00d4ff;
            color: #1a1a2e;
            padding: 5px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
        }

        .help-icon {
            display: inline-block;
            width: 18px;
            height: 18px;
            background: #00d4ff;
            color: #1a1a2e;
            border-radius: 50%;
            text-align: center;
            line-height: 18px;
            font-size: 12px;
            font-weight: bold;
            margin-left: 8px;
            cursor: help;
            position: relative;
        }

        .help-icon:hover .tooltip {
            display: block;
        }

        .tooltip {
            display: none;
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a2e;
            color: #e0e0e0;
            padding: 10px;
            border-radius: 5px;
            font-size: 12px;
            width: 250px;
            z-index: 1000;
            border: 1px solid #00d4ff;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
        }

        .symbol-checkboxes {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }

        .symbol-checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 5px;
            cursor: pointer;
        }

        .symbol-checkbox:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .symbol-checkbox input[type="checkbox"] {
            width: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 <span id="bot-name-display">ChatGPT Bot</span></h1>
            <div class="controls">
                <span id="status" class="status-badge status-stopped">ОСТАНОВЛЕН</span>
                <button class="btn btn-start" onclick="startBot()">▶ Запустить</button>
                <button class="btn btn-stop" onclick="stopBot()">⏹ Остановить</button>
                <button class="btn btn-restart" onclick="restartBot()">🔄 Перезапуск</button>
                <button class="btn btn-pause" onclick="pauseBot()">⏸ Пауза</button>
                <button class="btn-reset-balance" onclick="resetBalance()">💰 Сбросить баланс</button>
                <button class="settings-btn" onclick="openSettings()">⚙ Настройки</button>
            </div>
        </div>
        
        <!-- Settings Modal -->
        <div id="settingsModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>⚙ Настройки Бота</h2>
                    <button class="close-btn" onclick="closeSettings()">✕</button>
                </div>

                <div class="tabs">
                    <button class="tab active" onclick="switchTab('trading')">Торговля</button>
                    <button class="tab" onclick="switchTab('risk')">Риск</button>
                    <button class="tab" onclick="switchTab('regime')">Режим</button>
                    <button class="tab" onclick="switchTab('strategy')">Стратегия</button>
                    <button class="tab" onclick="switchTab('execution')">Исполнение</button>
                    <button class="tab" onclick="switchTab('templates')">Шаблоны</button>
                </div>
                
                <!-- Trading Tab -->
                <div id="trading-tab" class="tab-content active">
                    <div class="form-group">
                        <label>
                            Имя бота
                            <span class="help-icon">
                                !
                                <span class="tooltip">Название вашего бота. Отображается в заголовке панели. Можно изменить в реальном времени без перезапуска.</span>
                            </span>
                        </label>
                        <input type="text" id="bot-name" placeholder="ChatGPT Bot">
                    </div>
                    <div class="form-group">
                        <label>
                            Символы для торговли
                            <span class="help-icon">
                                !
                                <span class="tooltip">Выберите криптовалютные пары для торговли. Бот будет анализировать и торговать всеми выбранными символами. Например, BTCUSDT = Биткоин к USDT. Можно выбрать несколько для диверсификации - бот будет открывать позиции на разных монетах одновременно.</span>
                            </span>
                        </label>
                        <div class="symbol-checkboxes">
                            <label class="symbol-checkbox">
                                <input type="checkbox" id="symbol-btc" value="BTCUSDT" checked> BTCUSDT
                            </label>
                            <label class="symbol-checkbox">
                                <input type="checkbox" id="symbol-eth" value="ETHUSDT" checked> ETHUSDT
                            </label>
                            <label class="symbol-checkbox">
                                <input type="checkbox" id="symbol-sol" value="SOLUSDT" checked> SOLUSDT
                            </label>
                            <label class="symbol-checkbox">
                                <input type="checkbox" id="symbol-xrp" value="XRPUSDT" checked> XRPUSDT
                            </label>
                            <label class="symbol-checkbox">
                                <input type="checkbox" id="symbol-doge" value="DOGEUSDT" checked> DOGEUSDT
                            </label>
                            <label class="symbol-checkbox">
                                <input type="checkbox" id="symbol-ada" value="ADAUSDT" checked> ADAUSDT
                            </label>
                            <label class="symbol-checkbox">
                                <input type="checkbox" id="symbol-avax" value="AVAXUSDT" checked> AVAXUSDT
                            </label>
                            <label class="symbol-checkbox">
                                <input type="checkbox" id="symbol-link" value="LINKUSDT" checked> LINKUSDT
                            </label>
                            <label class="symbol-checkbox">
                                <input type="checkbox" id="symbol-dot" value="DOTUSDT" checked> DOTUSDT
                            </label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>
                            Таймфрейм (минуты)
                            <span class="help-icon">
                                !
                                <span class="tooltip">Размер свечи для анализа цены. 1 минута = быстрая торговля, много сигналов, но много ложных. 60 минут = медленная, надёжная торговля, меньше сигналов. Для новичков рекомендую 15 минут.</span>
                            </span>
                        </label>
                        <input type="number" id="trading-timeframe" placeholder="15">
                    </div>
                    <div class="form-group">
                        <label>
                            Макс. позиций
                            <span class="help-icon">
                                !
                                <span class="tooltip">Сколько позиций бот может держать одновременно. 1 = одна позиция за раз. 5 = может торговать 5 монетами одновременно. Больше позиций = больше риск, но больше возможностей.</span>
                            </span>
                        </label>
                        <input type="number" id="trading-max-positions" placeholder="1">
                    </div>
                    <div class="form-group">
                        <label>
                            Макс. сделок в день
                            <span class="help-icon">
                                !
                                <span class="tooltip">Сколько сделок бот может совершить за день. Ограничивает активность и комиссии. 10 = осторожная торговля. 100 = активная торговля.</span>
                            </span>
                        </label>
                        <input type="number" id="trading-max-daily-trades" placeholder="10">
                    </div>
                    <div class="form-group">
                        <label>
                            Плечо по умолчанию
                            <span class="help-icon">
                                !
                                <span class="tooltip">Кредитное плечо - берёшь деньги у биржи для торговли. 10x = с $100 можешь торговать на $1000. 50x = с $100 можешь торговать на $5000. Выше плечо = больше прибыль, но и быстрее потеряешь всё при движении цены против тебя. Для новичков рекомендую 10-20x.</span>
                            </span>
                        </label>
                        <input type="number" id="trading-default-leverage" placeholder="20">
                    </div>
                    <div class="form-group">
                        <label>
                            Макс. плечо
                            <span class="help-icon">
                                !
                                <span class="tooltip">Максимально возможное плечо. Бот никогда не превысит это значение, даже если рынок очень волатилен. Это защита от слишком высокого риска.</span>
                            </span>
                        </label>
                        <input type="number" id="trading-max-leverage" placeholder="100">
                    </div>
                    <div class="form-group">
                        <label>
                            Контекстный таймфрейм (минуты)
                            <span class="help-icon">
                                !
                                <span class="tooltip">Таймфрейм для анализа тренда. Обычно в 5 раз больше основного таймфрейма.</span>
                            </span>
                        </label>
                        <input type="number" id="trading-context-timeframe" placeholder="5">
                    </div>
                    <div class="form-group">
                        <label>
                            Мин. плечо
                            <span class="help-icon">
                                !
                                <span class="tooltip">Минимальное плечо для торговли.</span>
                            </span>
                        </label>
                        <input type="number" id="trading-min-leverage" placeholder="10">
                    </div>
                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="trading-leverage-scaling">
                            Масштабирование плеча по волатильности
                            <span class="help-icon">
                                !
                                <span class="tooltip">Автоматически снижать плечо при высокой волатильности.</span>
                            </span>
                        </label>
                    </div>
                </div>
                
                <!-- Risk Tab -->
                <div id="risk-tab" class="tab-content">
                    <div class="form-group">
                        <label>
                            Риск на сделку (%)
                            <span class="help-icon">
                                !
                                <span class="tooltip">Сколько процентов от твоего баланса ты готов потерять на одной сделке. 1% = очень осторожно. 5% = агрессивно. Если баланс $1000 и риск 2%, то максимум потеряешь $20 на одной сделке. Это защита от полной потери депозита.</span>
                            </span>
                        </label>
                        <input type="number" step="0.001" id="risk-per-trade" placeholder="0.5">
                    </div>
                    <div class="form-group">
                        <label>
                            Макс. дневной убыток (%)
                            <span class="help-icon">
                                !
                                <span class="tooltip">Если бот потеряет этот процент от баланса за день, он остановится. Например, 10% при $1000 = остановится если потеряешь $100 за день. Это защита от плохого дня.</span>
                            </span>
                        </label>
                        <input type="number" step="0.01" id="risk-max-daily-loss" placeholder="3">
                    </div>
                    <div class="form-group">
                        <label>
                            Макс. серия убытков
                            <span class="help-icon">
                                !
                                <span class="tooltip">Если бот сделает столько убыточных сделок подряд, он остановится. Например, 5 = после 5 убыточных сделок подряд бот остановится. Это защита от серии неудач.</span>
                            </span>
                        </label>
                        <input type="number" id="risk-consecutive-losses" placeholder="3">
                    </div>
                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="risk-atr-scaling">
                            Масштабирование позиции по ATR
                            <span class="help-icon">
                                !
                                <span class="tooltip">ATR = Average True Range, мера волатильности. Если включено, бот будет уменьшать размер позиции когда рынок очень волатилен (цена сильно скачет). Это снижает риск в опасные моменты.</span>
                            </span>
                        </label>
                    </div>
                    <div class="form-group">
                        <label>
                            Мин. размер позиции (USDT)
                            <span class="help-icon">
                                !
                                <span class="tooltip">Минимальный размер позиции в USDT.</span>
                            </span>
                        </label>
                        <input type="number" id="risk-min-position-size" placeholder="100000">
                    </div>
                    <div class="form-group">
                        <label>
                            Макс. размер позиции (USDT)
                            <span class="help-icon">
                                !
                                <span class="tooltip">Максимальный размер позиции в USDT.</span>
                            </span>
                        </label>
                        <input type="number" id="risk-max-position-size" placeholder="5000000">
                    </div>
                    <div class="form-group">
                        <label>
                            Макс. % от баланса на позицию
                            <span class="help-icon">
                                !
                                <span class="tooltip">Максимальный процент от баланса для одной позиции.</span>
                            </span>
                        </label>
                        <input type="number" step="0.01" id="risk-max-position-pct-balance" placeholder="0.5">
                    </div>
                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="risk-auto-reverse-sl">
                            Авто-реверс при СЛ
                            <span class="help-icon">
                                !
                                <span class="tooltip">Если позиция закрывается по Стоп-лоссу, автоматически открывать позицию в обратном направлении. Например, если ШОРТ закрывается по СЛ, открывать ЛОНГ.</span>
                            </span>
                        </label>
                    </div>
                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="risk-auto-reopen-tp">
                            Авто-переоткрытие при ТП
                            <span class="help-icon">
                                !
                                <span class="tooltip">Если позиция закрывается по Тейк-профиту, автоматически открывать позицию в том же направлении. Например, если ЛОНГ закрывается по ТП, открывать новый ЛОНГ.</span>
                            </span>
                        </label>
                    </div>
                </div>

                <!-- Regime Tab -->
                <div id="regime-tab" class="tab-content">
                    <div class="form-group">
                        <label>
                            ADX Trend Threshold
                            <span class="help-icon">
                                !
                                <span class="tooltip">ADX порог для определения тренда.</span>
                            </span>
                        </label>

                    </div>

                        <label>

                    <div class="form-group">

                                <span class="tooltip">Быстрая EMA для определения импульса.</span>

                <!-- Strategy Tab -->
                <div id="strategy-tab" class="tab-content">
                    <div class="form-group">
                        <label>
                            RSI Long Мин
                            <span class="help-icon">
                                !
                                <span class="tooltip">RSI = индикатор силы тренда (0-100). Для лонга (покупка) бот будет искать когда RSI упал ниже этого значения. 30 = покупка когда монета сильно упала (перепродана). 20 = очень агрессивная покупка на дне.</span>
                            </span>
                        </label>
                        <input type="number" step="0.1" id="strategy-rsi-long-min" placeholder="45">
                    </div>
                    <div class="form-group">
                        <label>
                            RSI Long Макс
                            <span class="help-icon">
                                !
                                <span class="tooltip">Верхняя граница для лонга. Бот не будет покупать если RSI выше этого. 70 = не покупай когда монета уже выросла много. Широкий диапазон (20-80) = больше сигналов. Узкий (40-60) = меньше, но точнее.</span>
                            </span>
                        </label>
                        <input type="number" step="0.1" id="strategy-rsi-long-max" placeholder="65">
                    </div>
                    <div class="form-group">
                        <label>
                            RSI Short Мин
                            <span class="help-icon">
                                !
                                <span class="tooltip">Нижняя граница для шорта (продажи). Бот не будет продавать если RSI ниже этого.</span>
                            </span>
                        </label>
                        <input type="number" step="0.1" id="strategy-rsi-short-min" placeholder="35">
                    </div>
                    <div class="form-group">
                        <label>
                            RSI Short Макс
                            <span class="help-icon">
                                !
                                <span class="tooltip">Для шорта бот будет искать когда RSI поднялся выше этого значения. 70 = продавай когда монета сильно выросла (перекуплена). 80 = очень агрессивная продажа на пике.</span>
                            </span>
                        </label>
                        <input type="number" step="0.1" id="strategy-rsi-short-max" placeholder="55">
                    </div>
                    <div class="form-group">
                        <label>
                            ATR Стоп-лосс множитель
                            <span class="help-icon">
                                !
                                <span class="tooltip">ATR = насколько сильно цена скачет. Множитель определяет где поставить стоп-лосс (автоматическая продажа если цена пошла против тебя). 1.5 = стоп на расстоянии 1.5x ATR от цены входа. Больше = стоп дальше, но риск больше. Меньше = стоп ближе, но может сработать случайно.</span>
                            </span>
                        </label>
                        <input type="number" step="0.1" id="strategy-atr-sl" placeholder="1.5">
                    </div>
                    <div class="form-group">
                        <label>
                            ATR Тейк-профит 1 множитель
                            <span class="help-icon">
                                !
                                <span class="tooltip">Где взять первую прибыль. 2.0 = закрою часть позиции когда цена пройдёт 2x ATR в мою сторону. Это фиксирует прибыль и снижает риск.</span>
                            </span>
                        </label>
                        <input type="number" step="0.1" id="strategy-atr-tp1" placeholder="2.0">
                    </div>
                    <div class="form-group">
                        <label>
                            ATR Тейк-профит 2 множитель
                            <span class="help-icon">
                                !
                                <span class="tooltip">Где взять вторую прибыль (оставшуюся часть позиции). 3.0 = закрою всю позицию когда цена пройдёт 3x ATR. Это позволяет взять больше прибыли если тренд сильный.</span>
                            </span>
                        </label>
                        <input type="number" step="0.1" id="strategy-atr-tp2" placeholder="3.0">
                    </div>
                    <div class="form-group">
                        <label>
                            Take Profit ROI (%)
                            <span class="help-icon">
                                !
                                <span class="tooltip">Целевая прибыль в процентах ROI для новых позиций. 10 = 10% ROI на марже.</span>
                            </span>
                        </label>
                        <input type="number" step="0.01" id="strategy-tp-roi" placeholder="10">
                    </div>
                    <div class="form-group">
                        <label>
                            Stop Loss ROI (%)
                            <span class="help-icon">

                        </label>
                        <input type="number" step="0.01" id="strategy-sl-roi" placeholder="4">

                </div>
                
                <!-- Execution Tab -->

                            </span>
                        </label>
                        <select id="execution-entry-type">
                            <option value="Market">Рыночный</option>
                            <option value="Limit">Лимитный</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>
                            Тип исходящего ордера
                            <span class="help-icon">
                                !
                                <span class="tooltip">Как бот будет закрывать позицию. Рыночный = быстро закрыть по текущей цене. Лимитный = закрыть по указанной цене (точнее, но может не сработать). Для стоп-лоссов лучше Рыночный.</span>
                            </span>
                        </label>
                        <select id="execution-exit-type">
                            <option value="Market">Рыночный</option>
                            <option value="Limit">Лимитный</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>
                            Макс. попыток
                            <span class="help-icon">
                                !
                                <span class="tooltip">Сколько раз бот будет пробовать открыть позицию если возникнет ошибка (например, биржа не ответила). 3 = три попытки с уменьшением размера позиции. Это помогает при временных проблемах с биржей.</span>

                        <input type="number" id="execution-max-retries" placeholder="3">

                </div>

                <!-- Templates Tab -->
                <div id="templates-tab" class="tab-content">
                    <div class="form-group">
                        <label>Все шаблоны</label>
                        <select id="saved-templates" onchange="loadTemplate()">
                            <option value="">-- Выберите шаблон --</option>
                        </select>
                    </div>
                    <hr style="margin: 20px 0; border-color: rgba(255,255,255,0.1);">

                        <label>Название шаблона</label>

        <div class="grid">
            <div class="card">
                <h3>💰 Баланс аккаунта</h3>

                <h3>📊 Дневной PnL</h3>
                <div class="metric" id="daily_pnl">0.00</div>

            </div>

            <div class="card">
                <h3>📈 Сделок за день</h3>
                <div class="metric" id="daily_trades">0</div>
                <div class="metric-label">Сделок</div>
            </div>

                <h3>🔴 Серия убытков</h3>

        <div class="grid">
            <div class="card">
                <h3>📍 Открытые позиции <button class="refresh-btn" onclick="loadPositions()">Обновить</button></h3>
                <table class="table" id="positions-table">
                    <thead>
                        <tr>
                            <th>Символ</th>

                            <th>Размер</th>
                            <th>Цена входа</th>
                            <th>Стоп</th>
                            <th>Тейк</th>
                            <th>PnL</th>
                            <th>PnL %</th>
                            <th>Действия</th>
                        </tr>
                    </thead>
                    <tbody id="positions-body">
                    </tbody>
                </table>
            </div>

            <div class="card">
                <h3>📋 Журнал транзакций <button class="refresh-btn" onclick="loadTradeHistory()">Обновить</button></h3>
                <table class="table" id="trade-history-table">
                    <thead>
                        <tr>
                            <th>Время</th>
                            <th>Символ</th>
                            <th>Тип</th>
                            <th>PnL</th>
                            <th>Вход</th>
                            <th>Выход</th>
                        </tr>
                    </thead>
                    <tbody id="trade-history-body">
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <script>
        let updateInterval;
        
        function loadPositions() {
            fetch('/api/positions')
                .then(response => response.json())
                .then(data => {
                    const tbody = document.getElementById('positions-body');
                    if (data.positions && data.positions.length > 0) {
                        tbody.innerHTML = data.positions.map(pos => {
                            const pnlClass = pos.current_pnl_net >= 0 ? 'positive' : 'negative';
                            const directionClass = pos.direction === 'long' ? 'direction-long' : 'direction-short';
                            const pnlPct = ((pos.current_pnl_net / (pos.entry_price * pos.size)) * 100).toFixed(2);
                            return `
                                <tr>
                                    <td><strong>${pos.symbol}</strong></td>
                                    <td><span class="${directionClass}">${pos.direction.toUpperCase()}</span></td>
                                    <td>${pos.size.toFixed(4)}</td>
                                    <td>${pos.entry_price.toFixed(2)}</td>
                                    <td>
                                        <input type="number" step="0.01" id="sl-${pos.symbol}" value="${pos.stop_loss || ''}" style="width: 80px;" placeholder="SL">
                                    </td>
                                    <td>
                                        <input type="number" step="0.01" id="tp-${pos.symbol}" value="${pos.take_profit_1 || ''}" style="width: 80px;" placeholder="TP">
                                    </td>
                                    <td class="${pnlClass}">${pos.current_pnl_net.toFixed(2)}</td>
                                    <td class="${pnlClass}">${pnlPct}%</td>
                                    <td>
                                        <button onclick="updateTPSL('${pos.symbol}')" style="padding: 5px 10px; font-size: 12px;">Обновить</button>
                                    </td>
                                </tr>
                            `;
                        }).join('');
                    } else {
                        tbody.innerHTML = '<tr><td colspan="9" style="text-align: center; padding: 20px;">Нет открытых позиций</td></tr>';
                    }
                })
                .catch(error => {
                    console.error('Error loading positions:', error);
                    document.getElementById('positions-body').innerHTML = '<tr><td colspan="9" style="text-align: center; padding: 20px;">Ошибка загрузки</td></tr>';
                });
        }

        function updateTPSL(symbol) {
            const sl = document.getElementById(`sl-${symbol}`).value;
            const tp = document.getElementById(`tp-${symbol}`).value;

            fetch('/api/positions/update_tp_sl', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    symbol: symbol,
                    stop_loss: sl ? parseFloat(sl) : null,
                    take_profit: tp ? parseFloat(tp) : null
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'updated') {
                    alert(`TP/SL обновлено для ${symbol}`);
                    loadPositions(); // Refresh positions
                } else {
                    alert('Ошибка: ' + (data.error || 'Неизвестная ошибка'));
                }
            })
            .catch(error => {
                console.error('Error updating TP/SL:', error);
                alert('Ошибка обновления TP/SL');
            });
        }

        function loadTradeHistory() {
            fetch('/api/trade_history')
                .then(response => response.json())
                .then(data => {
                    const tbody = document.getElementById('trade-history-body');
                    if (data.history && data.history.length > 0) {
                        tbody.innerHTML = data.history.slice(0, 20).map(trade => {
                            const pnlClass = trade.pnl_net >= 0 ? 'positive' : 'negative';
                            const directionClass = trade.direction === 'long' ? 'direction-long' : 'direction-short';
                            const entryPrice = trade.entry || 0;
                            const exitPrice = trade.exit || 0;
                            return `
                                <tr>
                                    <td>${new Date(trade.id).toLocaleString()}</td>
                                    <td><strong>${trade.symbol}</strong></td>
                                    <td><span class="${directionClass}">${trade.direction.toUpperCase()}</span></td>
                                    <td class="${pnlClass}">${trade.pnl_net.toFixed(2)}</td>
                                    <td>${entryPrice.toFixed(2)}</td>
                                    <td>${exitPrice.toFixed(2)}</td>
                                </tr>
                            `;
                        }).join('');
                    } else {
                        tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 20px;">Нет истории сделок</td></tr>';
                    }
                })
                .catch(error => {
                    console.error('Error loading trade history:', error);
                    document.getElementById('trade-history-body').innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 20px;">Ошибка загрузки</td></tr>';
                });
        }

        function updateStatus() {
            fetch('/api/status')
                .then(response => response.json())
                .then(data => {
                    if (data.error) {
                        console.error('Status error:', data.error);
                        return;
                    }

                    if (data.balance !== undefined) {
                        document.getElementById('balance').textContent = data.balance.toFixed(2);
                    }
                    if (data.daily_pnl !== undefined) {
                        document.getElementById('daily_pnl').textContent = data.daily_pnl.toFixed(2);
                    }
                    if (data.daily_trades !== undefined) {
                        document.getElementById('daily_trades').textContent = data.daily_trades;
                    }
                    if (data.consecutive_losses !== undefined) {
                        document.getElementById('consecutive_losses').textContent = data.consecutive_losses;
                    }

                    const statusEl = document.getElementById('status');
                    const startBtn = document.querySelector('.btn-start');

                    if (data.paused) {
                        statusEl.className = 'status-badge status-paused';
                        statusEl.textContent = 'НА ПАУЗЕ';
                        startBtn.classList.remove('active');
                    } else if (data.running) {
                        statusEl.className = 'status-badge status-running';
                        statusEl.textContent = 'РАБОТАЕТ';
                        startBtn.classList.add('active');
                    } else {
                        statusEl.className = 'status-badge status-stopped';
                        statusEl.textContent = 'ОСТАНОВЛЕН';
                        startBtn.classList.remove('active');
                    }

                    const dailyPnlEl = document.getElementById('daily_pnl');
                    dailyPnlEl.className = 'metric ' + (data.daily_pnl >= 0 ? 'positive' : 'negative');

                    // Load positions
                    loadPositions();
                })
                .catch(error => console.error('Error:', error));
        }

        // Template functions
        function loadTemplateList() {
            const templates = JSON.parse(localStorage.getItem('botTemplates') || '{}');
            const select = document.getElementById('saved-templates');
            select.innerHTML = '<option value="">-- Выберите шаблон --</option>';

            // Add saved templates
            Object.keys(templates).forEach(name => {
                const option = document.createElement('option');
                option.value = name;
                option.textContent = name;
                select.appendChild(option);
            });
        }

        function saveTemplate() {
            const name = document.getElementById('template-name').value;
            if (!name) {
                alert('Введите название шаблона');
                return;
            }

            // Get selected symbols
            const selectedSymbols = [];
            document.querySelectorAll('.symbol-checkbox input[type="checkbox"]:checked').forEach(cb => {
                selectedSymbols.push(cb.value);
            });

            const configData = {
                trading: {
                    symbols: selectedSymbols,
                    timeframe: document.getElementById('trading-timeframe').value,
                    max_positions: parseInt(document.getElementById('trading-max-positions').value),
                    max_daily_trades: parseInt(document.getElementById('trading-max-daily-trades').value),
                    default_leverage: parseInt(document.getElementById('trading-default-leverage').value),
                    max_leverage: parseInt(document.getElementById('trading-max-leverage').value)
                },
                risk: {
                    risk_per_trade_pct: parseFloat(document.getElementById('risk-per-trade').value) / 100,
                    max_daily_loss_pct: parseFloat(document.getElementById('risk-max-daily-loss').value) / 100,
                    max_consecutive_losses: parseInt(document.getElementById('risk-consecutive-losses').value),
                    atr_position_scaling: document.getElementById('risk-atr-scaling').checked
                },
                strategy: {
                    rsi_long_min: parseFloat(document.getElementById('strategy-rsi-long-min').value),
                    rsi_long_max: parseFloat(document.getElementById('strategy-rsi-long-max').value),
                    rsi_short_min: parseFloat(document.getElementById('strategy-rsi-short-min').value),
                    rsi_short_max: parseFloat(document.getElementById('strategy-rsi-short-max').value),
                    atr_multiplier_sl: parseFloat(document.getElementById('strategy-atr-sl').value),
                    atr_multiplier_tp1: parseFloat(document.getElementById('strategy-atr-tp1').value),
                    atr_multiplier_tp2: parseFloat(document.getElementById('strategy-atr-tp2').value)
                },
                execution: {
                    entry_order_type: document.getElementById('execution-entry-type').value,
                    exit_order_type: document.getElementById('execution-exit-type').value,
                    max_retries: parseInt(document.getElementById('execution-max-retries').value)
                }
            };

            const templates = JSON.parse(localStorage.getItem('botTemplates') || '{}');
            templates[name] = configData;
            localStorage.setItem('botTemplates', JSON.stringify(templates));
            loadTemplateList();
            alert('Шаблон сохранён!');
        }

        function loadTemplate() {
            const name = document.getElementById('saved-templates').value;
            if (!name) {
                alert('Выберите шаблон');
                return;
            }

            // Load from saved templates
            const templates = JSON.parse(localStorage.getItem('botTemplates') || '{}');
            const config = templates[name];

            if (!config) {
                alert('Шаблон не найден');
                return;
            }

            // Load values
            // Load symbols
            if (config.symbols) {
                document.querySelectorAll('.symbol-checkbox input[type="checkbox"]').forEach(cb => {
                    cb.checked = config.symbols.includes(cb.value);
                });
            } else if (config.trading && config.trading.symbols) {
                document.querySelectorAll('.symbol-checkbox input[type="checkbox"]').forEach(cb => {
                    cb.checked = config.trading.symbols.includes(cb.value);
                });
            }

            document.getElementById('trading-timeframe').value = config.trading ? config.trading.timeframe : config.timeframe;
            document.getElementById('trading-max-positions').value = config.trading ? config.trading.max_positions : config.max_positions;
            document.getElementById('trading-max-daily-trades').value = config.trading ? config.trading.max_daily_trades : config.max_daily_trades;
            document.getElementById('trading-default-leverage').value = config.trading ? config.trading.default_leverage : config.default_leverage;
            document.getElementById('trading-max-leverage').value = config.trading ? config.trading.max_leverage : config.max_leverage;

            document.getElementById('risk-per-trade').value = config.risk.risk_per_trade_pct * 100;
            document.getElementById('risk-max-daily-loss').value = config.risk.max_daily_loss_pct * 100;
            document.getElementById('risk-consecutive-losses').value = config.risk.max_consecutive_losses;
            document.getElementById('risk-atr-scaling').checked = config.risk.atr_position_scaling;

            document.getElementById('strategy-rsi-long-min').value = config.strategy.rsi_long_min;
            document.getElementById('strategy-rsi-long-max').value = config.strategy.rsi_long_max;
            document.getElementById('strategy-rsi-short-min').value = config.strategy.rsi_short_min;
            document.getElementById('strategy-rsi-short-max').value = config.strategy.rsi_short_max;
            document.getElementById('strategy-atr-sl').value = config.strategy.atr_multiplier_sl;
            document.getElementById('strategy-atr-tp1').value = config.strategy.atr_multiplier_tp1;
            document.getElementById('strategy-atr-tp2').value = config.strategy.atr_multiplier_tp2;

            document.getElementById('execution-entry-type').value = config.execution.entry_order_type;
            document.getElementById('execution-exit-type').value = config.execution.exit_order_type;
            document.getElementById('execution-max-retries').value = config.execution.max_retries;

            // Save active template to localStorage
            localStorage.setItem('activeTemplate', name);

            alert('Шаблон загружен!');
        }

        function deleteTemplate() {
            const name = document.getElementById('saved-templates').value;
            if (!name) {
                alert('Выберите шаблон');
                return;
            }

            if (!confirm('Удалить шаблон "' + name + '"?')) {
                return;
            }

            const templates = JSON.parse(localStorage.getItem('botTemplates') || '{}');
            delete templates[name];
            localStorage.setItem('botTemplates', JSON.stringify(templates));
            loadTemplateList();
            alert('Шаблон удалён');
        }

        function loadTradeHistory() {
            fetch('/api/trade_history')
                .then(response => response.json())
                .then(data => {
                    const tbody = document.getElementById('trade-history-body');
                    tbody.innerHTML = '';
                    data.history.slice(-10).reverse().forEach(trade => {
                        const row = document.createElement('tr');
                        row.innerHTML = `
                            <td>${new Date(trade.timestamp * 1000).toLocaleString()}</td>
                            <td>${trade.symbol}</td>
                            <td>${trade.type}</td>
                            <td class="${trade.pnl >= 0 ? 'positive' : 'negative'}">${trade.pnl.toFixed(2)}</td>
                        `;
                        tbody.appendChild(row);
                    });
                })
                .catch(error => console.error('Error:', error));
        }
        
        function loadLogs() {
            fetch('/api/logs')
                .then(response => response.json())
                .then(data => {
                    const container = document.getElementById('logs-container');
                    container.innerHTML = '';
                    data.logs.forEach(log => {
                        const div = document.createElement('div');
                        div.className = 'log-line';
                        if (log.includes('INFO')) div.classList.add('log-info');
                        else if (log.includes('WARNING')) div.classList.add('log-warning');
                        else if (log.includes('ERROR')) div.classList.add('log-error');
                        div.textContent = log;
                        container.appendChild(div);
                    });
                    container.scrollTop = container.scrollHeight;
                })
                .catch(error => console.error('Error:', error));
        }
        
        function startBot() {
            fetch('/api/bot/start', { method: 'POST' })
                .then(response => response.json())
                .then(data => {
                    console.log(data);
                    updateStatus();
                })
                .catch(error => console.error('Error:', error));
        }
        
        function stopBot() {
            fetch('/api/bot/stop', { method: 'POST' })
                .then(response => response.json())
                .then(data => {
                    console.log(data);
                    updateStatus();
                })
                .catch(error => console.error('Error:', error));
        }

        function restartBot() {
            fetch('/api/bot/stop', { method: 'POST' })
                .then(response => response.json())
                .then(data => {
                    // Wait a moment then start
                    setTimeout(() => {
                        fetch('/api/bot/start', { method: 'POST' })
                            .then(response => response.json())
                            .then(data => {
                                console.log(data);
                                updateStatus();
                            })
                            .catch(error => console.error('Error:', error));
                    }, 1000);
                })
                .catch(error => console.error('Error:', error));
        }

        function pauseBot() {
            fetch('/api/bot/pause', { method: 'POST' })
                .then(response => response.json())
                .then(data => {
                    console.log(data);
                    updateStatus();
                })
                .catch(error => console.error('Error:', error));
        }

        // Settings functions
        function openSettings() {
            loadConfig();
            loadTemplateList();
            document.getElementById('settingsModal').classList.add('active');
        }
        
        function closeSettings() {
            document.getElementById('settingsModal').classList.remove('active');
        }
        
        function switchTab(tabName) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab').forEach(btn => {
                btn.classList.remove('active');
            });
            
            // Show selected tab
            document.getElementById(tabName + '-tab').classList.add('active');
            event.target.classList.add('active');
        }
        
        function loadConfig() {
            fetch('/api/config')
                .then(response => response.json())
                .then(data => {
                    // Bot name
                    if (data.bot_name) {
                        document.getElementById('bot-name').value = data.bot_name;
                        document.getElementById('bot-name-display').textContent = data.bot_name;
                    }

                    // Trading settings
                    // Load symbols from config
                    if (data.trading.symbols) {
                        document.querySelectorAll('.symbol-checkbox input[type="checkbox"]').forEach(cb => {
                            cb.checked = data.trading.symbols.includes(cb.value);
                        });
                    }

                    document.getElementById('trading-timeframe').value = data.trading.main_timeframe || data.trading.timeframe || '1';
                    document.getElementById('trading-context-timeframe').value = data.trading.context_timeframe || '5';
                    document.getElementById('trading-max-positions').value = data.trading.max_positions;
                    document.getElementById('trading-max-daily-trades').value = data.trading.max_daily_trades;
                    document.getElementById('trading-default-leverage').value = data.trading.default_leverage;
                    document.getElementById('trading-max-leverage').value = data.trading.max_leverage;
                    document.getElementById('trading-min-leverage').value = data.trading.min_leverage || 10;
                    document.getElementById('trading-leverage-scaling').checked = data.trading.leverage_scaling || false;

                    // Risk settings
                    document.getElementById('risk-per-trade').value = data.risk.risk_per_trade_pct * 100;
                    document.getElementById('risk-max-daily-loss').value = data.risk.max_daily_loss_pct * 100;
                    document.getElementById('risk-consecutive-losses').value = data.risk.max_consecutive_losses;
                    document.getElementById('risk-atr-scaling').checked = data.risk.atr_position_scaling;
                    document.getElementById('risk-min-position-size').value = data.risk.min_position_size_usd || 100000;
                    document.getElementById('risk-max-position-size').value = data.risk.max_position_size_usd || 5000000;
                    document.getElementById('risk-max-position-pct-balance').value = data.risk.max_position_pct_of_balance || 0.5;
                    document.getElementById('risk-auto-reverse-sl').checked = data.risk.auto_reverse_on_sl || false;
                    document.getElementById('risk-auto-reopen-tp').checked = data.risk.auto_reopen_on_tp || false;

                    // Regime settings
                    if (data.regime) {
                        document.getElementById('regime-adx-trend-threshold').value = data.regime.adx_trend_threshold || 5.0;
                        document.getElementById('regime-adx-chop-threshold').value = data.regime.adx_chop_threshold || 3.0;
                        document.getElementById('regime-ema-fast').value = data.regime.ema_fast || 20;
                        document.getElementById('regime-ema-medium').value = data.regime.ema_medium || 50;
                        document.getElementById('regime-ema-slow').value = data.regime.ema_slow || 200;
                    }

                    // Strategy settings
                    if (data.strategy.rsi_oversold !== undefined) {
                        document.getElementById('strategy-rsi-long-min').value = data.strategy.rsi_oversold;
                        document.getElementById('strategy-rsi-long-max').value = data.strategy.rsi_overbought;
                        document.getElementById('strategy-rsi-short-min').value = data.strategy.rsi_oversold;
                        document.getElementById('strategy-rsi-short-max').value = data.strategy.rsi_overbought;
                    } else {
                        // Fallback for old config structure
                        document.getElementById('strategy-rsi-long-min').value = data.strategy.rsi_long_min;
                        document.getElementById('strategy-rsi-long-max').value = data.strategy.rsi_long_max;
                        document.getElementById('strategy-rsi-short-min').value = data.strategy.rsi_short_min;
                        document.getElementById('strategy-rsi-short-max').value = data.strategy.rsi_short_max;
                    }

                    if (data.strategy.sl_min_pct !== undefined) {
                        document.getElementById('strategy-atr-sl').value = data.strategy.sl_min_pct * 100;
                        document.getElementById('strategy-atr-tp1').value = data.strategy.tp_min_pct * 100;
                        document.getElementById('strategy-atr-tp2').value = data.strategy.tp_max_pct * 100;
                    } else {
                        // Fallback for old config structure
                        document.getElementById('strategy-atr-sl').value = data.strategy.atr_multiplier_sl;
                        document.getElementById('strategy-atr-tp1').value = data.strategy.atr_multiplier_tp1;
                        document.getElementById('strategy-atr-tp2').value = data.strategy.atr_multiplier_tp2;
                    }

                    // TP/SL ROI settings
                    if (data.strategy.tp_roi_pct !== undefined) {
                        document.getElementById('strategy-tp-roi').value = data.strategy.tp_roi_pct * 100;
                    }
                    if (data.strategy.sl_roi_pct !== undefined) {
                        document.getElementById('strategy-sl-roi').value = data.strategy.sl_roi_pct * 100;
                    }

                    // Execution settings
                    document.getElementById('execution-entry-type').value = data.execution.entry_order_type;
                    document.getElementById('execution-exit-type').value = data.execution.exit_order_type;
                    document.getElementById('execution-max-retries').value = data.execution.max_retries;
                })
                .catch(error => console.error('Error loading config:', error));
        }
        
        function saveSettings() {
            const botName = document.getElementById('bot-name').value;

            // Get selected template
            const templateSelect = document.getElementById('saved-templates');
            let selectedTemplate = templateSelect.value;
            // Extract template name from preset_ prefix
            if (selectedTemplate.startsWith('preset_')) {
                selectedTemplate = selectedTemplate.replace('preset_', '');
            }

            // Get selected symbols
            const selectedSymbols = [];
            document.querySelectorAll('.symbol-checkbox input[type="checkbox"]:checked').forEach(cb => {
                selectedSymbols.push(cb.value);
            });

            const configData = {
                bot_name: botName,
                selected_template: selectedTemplate,
                trading: {
                    symbols: selectedSymbols,
                    main_timeframe: document.getElementById('trading-timeframe').value,
                    context_timeframe: document.getElementById('trading-context-timeframe').value,
                    max_positions: parseInt(document.getElementById('trading-max-positions').value),
                    max_daily_trades: parseInt(document.getElementById('trading-max-daily-trades').value),
                    default_leverage: parseInt(document.getElementById('trading-default-leverage').value),
                    max_leverage: parseInt(document.getElementById('trading-max-leverage').value),
                    min_leverage: parseInt(document.getElementById('trading-min-leverage').value),
                    leverage_scaling: document.getElementById('trading-leverage-scaling').checked
                },
                risk: {
                    risk_per_trade_pct: parseFloat(document.getElementById('risk-per-trade').value) / 100,
                    max_daily_loss_pct: parseFloat(document.getElementById('risk-max-daily-loss').value) / 100,
                    max_consecutive_losses: parseInt(document.getElementById('risk-consecutive-losses').value),
                    atr_position_scaling: document.getElementById('risk-atr-scaling').checked,
                    min_position_size_usd: parseFloat(document.getElementById('risk-min-position-size').value),
                    max_position_size_usd: parseFloat(document.getElementById('risk-max-position-size').value),
                    max_position_pct_of_balance: parseFloat(document.getElementById('risk-max-position-pct-balance').value),
                    auto_reverse_on_sl: document.getElementById('risk-auto-reverse-sl').checked,
                    auto_reopen_on_tp: document.getElementById('risk-auto-reopen-tp').checked
                },
                regime: {
                    adx_trend_threshold: parseFloat(document.getElementById('regime-adx-trend-threshold').value),
                    adx_chop_threshold: parseFloat(document.getElementById('regime-adx-chop-threshold').value),
                    ema_fast: parseInt(document.getElementById('regime-ema-fast').value),
                    ema_medium: parseInt(document.getElementById('regime-ema-medium').value),
                    ema_slow: parseInt(document.getElementById('regime-ema-slow').value)
                },
                strategy: {
                    rsi_oversold: parseFloat(document.getElementById('strategy-rsi-long-min').value),
                    rsi_overbought: parseFloat(document.getElementById('strategy-rsi-long-max').value),
                    sl_min_pct: parseFloat(document.getElementById('strategy-atr-sl').value) / 100,
                    tp_min_pct: parseFloat(document.getElementById('strategy-atr-tp1').value) / 100,
                    tp_max_pct: parseFloat(document.getElementById('strategy-atr-tp2').value) / 100,
                    min_atr_pct: 0.0,
                    max_atr_pct: 1.0,
                    tp_roi_pct: parseFloat(document.getElementById('strategy-tp-roi').value) / 100,
                    sl_roi_pct: parseFloat(document.getElementById('strategy-sl-roi').value) / 100
                },
                execution: {
                    entry_order_type: document.getElementById('execution-entry-type').value,
                    exit_order_type: document.getElementById('execution-exit-type').value,
                    max_retries: parseInt(document.getElementById('execution-max-retries').value)
                }
            };

            fetch('/api/config/update', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(configData)
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'updated') {
                    document.getElementById('bot-name-display').textContent = botName;
                    alert('Настройки сохранены успешно!');
                    closeSettings();
                } else {
                    alert('Ошибка сохранения настроек: ' + (data.error || 'Неизвестная ошибка'));
                }
            })
            .catch(error => {
                console.error('Error saving config:', error);
                alert('Ошибка сохранения настроек');
            });
        }

        function resetBalance() {
            if (!confirm('Сбросить баланс демо-счета до $1,000,000?')) {
                return;
            }

            fetch('/api/account/reset_balance', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'reset' || data.status === 'already_at_target') {
                    alert(`Баланс сброшен: $${data.previous_balance?.toFixed(2) || 'N/A'} → $${data.new_balance?.toFixed(2) || 'N/A'}`);
                    updateStatus();
                } else {
                    alert('Ошибка сброса баланса: ' + (data.error || 'Неизвестная ошибка'));
                }
            })
            .catch(error => {
                console.error('Error resetting balance:', error);
                alert('Ошибка сброса баланса');
            });
        }
        
        // Auto-update every 3 seconds
        function startAutoUpdate() {
            updateStatus();
            loadPositions();
            loadTradeHistory();
            updateInterval = setInterval(() => {
                updateStatus();
                loadPositions();
                loadTradeHistory();
            }, 3000);
        }

        // Auto-load active template on page load
        function loadActiveTemplate() {
            const activeTemplate = localStorage.getItem('activeTemplate');
            if (activeTemplate) {
                document.getElementById('saved-templates').value = activeTemplate;
                loadTemplate();
            }
        }

        // Load on startup
        loadActiveTemplate();
        startAutoUpdate();
    </script>
</body>
</html>
